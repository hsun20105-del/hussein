<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>المشاريع</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      direction: rtl;
      
      /* الخلفية الأسود البنفسجي */
      background: linear-gradient(135deg, #0b0014, #1a0033, #000000);
      color: white;
    }
  
    .box {
      text-align: center;
      padding: 25px 30px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(120, 0, 255, 0.2);
      backdrop-filter: blur(6px);
    }
  
    h2 {
      color: #d6b3ff;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>لم يتم إضافة أي مشاريع حالياً</h2>
  </div>

</body>
</html>
